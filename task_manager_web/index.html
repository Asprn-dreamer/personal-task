<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowTask 个人任务管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">F</span>
          <div>
            <strong>FlowTask</strong>
            <small>个人任务管理</small>
          </div>
        </div>

        <nav class="nav-list" aria-label="任务视图">
          <button class="nav-item is-active" data-view="all" type="button">
            <span>◎</span>
            全部任务
          </button>
          <button class="nav-item" data-view="today" type="button">
            <span>◐</span>
            今日任务
          </button>
          <button class="nav-item" data-view="upcoming" type="button">
            <span>◇</span>
            即将到期
          </button>
          <button class="nav-item" data-view="completed" type="button">
            <span>✓</span>
            已完成
          </button>
        </nav>

        <section class="side-section">
          <div class="section-title">标签</div>
          <div id="tagList" class="tag-list"></div>
        </section>

      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Today, keep it moving</p>
            <h1>任务控制台</h1>
          </div>
          <div class="topbar-actions">
            <label class="search-box">
              <span>⌕</span>
              <input id="searchInput" type="search" placeholder="搜索任务、描述或标签" />
            </label>
            <button id="themeToggle" class="icon-button" type="button" aria-label="切换主题">◑</button>
            <button id="openTaskModal" class="icon-button add-task-top" type="button" aria-label="新建任务">＋</button>
          </div>
        </header>

        <section class="stats-grid" aria-label="任务统计">
          <article class="stat-card coral">
            <span>今日待办</span>
            <strong id="todayCount">0</strong>
            <small id="todayHint">保持节奏</small>
            <div class="stat-popover" id="todayPopover"></div>
          </article>
          <article class="stat-card ink">
            <span>高优先级</span>
            <strong id="highCount">0</strong>
            <small>需要优先处理</small>
            <div class="stat-popover" id="highPopover"></div>
          </article>
          <article class="stat-card mint">
            <span>完成率</span>
            <strong id="completionRate">0%</strong>
            <small id="completedCount">0 个已完成</small>
            <div class="stat-popover" id="completedPopover"></div>
          </article>
          <article class="stat-card paper">
            <span>逾期任务</span>
            <strong id="overdueCount">0</strong>
            <small>尽快重新安排</small>
            <div class="stat-popover" id="overduePopover"></div>
          </article>
        </section>

        <section class="controls-panel">
          <div class="segmented" role="tablist" aria-label="状态筛选">
            <button class="segment is-active" data-status="all" type="button">全部</button>
            <button class="segment" data-status="todo" type="button">未开始</button>
            <button class="segment" data-status="doing" type="button">进行中</button>
            <button class="segment" data-status="done" type="button">已完成</button>
          </div>
          <div class="filter-row">
            <div class="custom-select" data-menu="priority">
              <button id="priorityMenuButton" class="custom-select-button" type="button" aria-expanded="false">
                <span id="priorityMenuLabel">全部优先级</span>
                <i>⌄</i>
              </button>
              <div class="custom-select-menu" role="menu">
                <button class="is-selected" data-priority-value="all" type="button">全部优先级</button>
                <button data-priority-value="high" type="button">高优先级</button>
                <button data-priority-value="medium" type="button">中优先级</button>
                <button data-priority-value="low" type="button">低优先级</button>
              </div>
            </div>
            <div class="custom-select" data-menu="sort">
              <button id="sortMenuButton" class="custom-select-button" type="button" aria-expanded="false">
                <span id="sortMenuLabel">智能排序</span>
                <i>⌄</i>
              </button>
              <div class="custom-select-menu" role="menu">
                <button class="is-selected" data-sort-value="smart" type="button">智能排序</button>
                <button data-sort-value="priority" type="button">按优先级</button>
                <button data-sort-value="due" type="button">按截止时间</button>
                <button data-sort-value="created" type="button">按创建时间</button>
                <button data-sort-value="manual" type="button">手动排序</button>
              </div>
            </div>
          </div>
        </section>

        <section class="main-grid">
          <section class="task-column">
            <div class="column-head">
              <div>
                <h2 id="viewTitle">全部任务</h2>
                <p id="viewSubtitle">拖动任务卡片可以调整手动顺序。</p>
              </div>
              <div class="column-actions">
                <button id="openTaskModalInline" class="primary-button" type="button">＋ 新建任务</button>
                <button id="clearCompleted" class="ghost-button" type="button">清理已完成</button>
              </div>
            </div>
            <div id="taskList" class="task-list" aria-live="polite"></div>
          </section>

          <aside class="detail-column">
            <section class="achievement-card">
              <div class="history-block">
                <div>
                  <span class="section-title">今日成就</span>
                  <strong>最近完成</strong>
                </div>
                <div class="history-stats">
                  <span><b id="weekDoneCount">0</b> 本周</span>
                  <span><b id="monthDoneCount">0</b> 本月</span>
                </div>
                <div id="completionHistory" class="completion-history"></div>
              </div>
            </section>

            <section class="calendar-card">
              <div class="calendar-head apple-calendar-head">
                <div>
                  <span class="section-title">日历</span>
                  <strong id="monthLabel">本月</strong>
                </div>
                <div class="calendar-controls" aria-label="日历切换">
                  <button id="prevMonth" class="calendar-nav" type="button" aria-label="上个月">‹</button>
                  <button id="todayButton" class="calendar-today" type="button">今天</button>
                  <button id="nextMonth" class="calendar-nav" type="button" aria-label="下个月">›</button>
                </div>
              </div>
              <div class="calendar-weekdays" aria-hidden="true">
                <span>一</span>
                <span>二</span>
                <span>三</span>
                <span>四</span>
                <span>五</span>
                <span>六</span>
                <span>日</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <div id="taskModal" class="modal-backdrop" aria-hidden="true">
      <form id="taskForm" class="task-modal" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <span class="eyebrow">Task details</span>
            <h2 id="modalTitle">新建任务</h2>
          </div>
          <button id="closeTaskModal" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>

        <input id="taskId" type="hidden" />
        <label>
          任务标题
          <input id="taskTitle" required maxlength="60" placeholder="例如：完成产品原型" />
        </label>
        <label>
          任务描述
          <textarea id="taskDescription" rows="3" placeholder="补充背景、交付物或注意事项"></textarea>
        </label>
        <div class="form-grid">
          <label>
            优先级
            <select id="taskPriority" class="native-hidden">
              <option value="high">高</option>
              <option value="medium" selected>中</option>
              <option value="low">低</option>
            </select>
            <div class="choice-group" data-choice-for="taskPriority">
              <button data-value="high" type="button">高</button>
              <button data-value="medium" type="button">中</button>
              <button data-value="low" type="button">低</button>
            </div>
          </label>
          <label>
            状态
            <select id="taskStatus" class="native-hidden">
              <option value="todo">未开始</option>
              <option value="doing">进行中</option>
              <option value="done">已完成</option>
            </select>
            <div class="choice-group" data-choice-for="taskStatus">
              <button data-value="todo" type="button">未开始</button>
              <button data-value="doing" type="button">进行中</button>
              <button data-value="done" type="button">已完成</button>
            </div>
          </label>
        </div>
        <div class="form-grid">
          <label>
            截止日期
            <input id="taskDueDate" type="date" required />
          </label>
          <label>
            标签
            <input id="taskTags" placeholder="工作, 学习" />
          </label>
        </div>
        <label>
          重复
          <select id="taskRepeat" class="native-hidden">
            <option value="none" selected>不重复</option>
            <option value="daily">每天</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
          <div class="choice-group repeat-choice" data-choice-for="taskRepeat">
            <button data-value="none" type="button">不重复</button>
            <button data-value="daily" type="button">每天</button>
            <button data-value="weekly" type="button">每周</button>
            <button data-value="monthly" type="button">每月</button>
          </div>
        </label>
        <label class="check-row">
          <input id="taskPinned" type="checkbox" />
          <span>置顶重要任务</span>
        </label>

        <div class="subtask-editor">
          <div class="subtask-top">
            <span>子任务</span>
            <button id="addSubtask" class="ghost-button" type="button">＋ 添加</button>
          </div>
          <div id="subtaskFields" class="subtask-fields"></div>
        </div>

        <div class="modal-actions">
          <button id="deleteTask" class="danger-button" type="button">删除</button>
          <button class="primary-button" type="submit">保存任务</button>
        </div>
      </form>
    </div>

    <div id="canvasModal" class="modal-backdrop canvas-backdrop" aria-hidden="true">
      <section class="canvas-modal" role="dialog" aria-modal="true" aria-labelledby="canvasTitle">
        <header class="canvas-head">
          <div>
            <span class="eyebrow">Task canvas</span>
            <h2 id="canvasTitle">任务画布</h2>
            <p id="canvasMeta">把文字、图片和视频资料铺在一张自由画布上。</p>
          </div>
          <div class="canvas-head-actions">
            <button id="canvasEditTask" class="ghost-button" type="button">编辑任务</button>
            <button id="toggleCanvasFullscreen" class="icon-button canvas-fullscreen-button" type="button" aria-label="全屏显示"></button>
            <button id="closeCanvasModal" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>
        </header>
        <div class="canvas-toolbar" aria-label="画布工具">
          <button id="addTextBlock" class="tool-button" type="button">＋ 文字</button>
          <button id="addImageBlock" class="tool-button" type="button">＋ 图片</button>
          <button id="addVideoBlock" class="tool-button" type="button">＋ 视频</button>
          <button id="addVideoUrlBlock" class="tool-button" type="button">＋ 视频链接</button>
          <button id="toggleConnectMode" class="tool-button" type="button">关系线</button>
          <button id="canvasMuteAll" class="tool-button icon-tool-button is-muted" type="button" aria-label="取消全局静音"></button>
          <input id="canvasImageInput" type="file" accept="image/*" hidden />
          <input id="canvasVideoInput" type="file" accept="video/*" hidden />
          <span id="canvasSaveState">自动保存</span>
        </div>
        <div id="infiniteCanvas" class="infinite-canvas">
          <div id="canvasWorld" class="canvas-world"></div>
          <div id="canvasSelectionBox" class="canvas-selection-box" hidden></div>
          <div class="canvas-hint">拖动画布空白处移动视野，拖动卡片移动内容。</div>
          <div id="connectionTypePicker" class="connection-type-picker" hidden>
            <span>选择线型</span>
            <button data-type="related" type="button">
              <span class="line-preview line-solid"></span>
              <strong>实线</strong>
            </button>
            <button data-type="sequence" type="button">
              <span class="line-preview line-arrow"></span>
              <strong>箭头</strong>
            </button>
            <button data-type="cause" type="button">
              <span class="line-preview line-dashed"></span>
              <strong>虚线</strong>
            </button>
            <button data-type="child" type="button">
              <span class="line-preview line-branch"></span>
              <strong>分支线</strong>
            </button>
          </div>
          <input id="connectionLabelEditor" class="connection-label-editor" hidden placeholder="输入连线标注" />
        </div>
        <footer class="canvas-footer">
          <button id="resetCanvasView" class="ghost-button" type="button">回到中心</button>
          <div class="zoom-controls">
            <button id="zoomOutCanvas" class="mini-action" type="button" aria-label="缩小">−</button>
            <span id="canvasZoomLabel">100%</span>
            <button id="zoomInCanvas" class="mini-action" type="button" aria-label="放大">＋</button>
          </div>
        </footer>
      </section>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
