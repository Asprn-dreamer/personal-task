<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowTask 个人任务管理</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">F</span>
          <div>
            <strong>FlowTask</strong>
            <small>个人任务管理</small>
          </div>
        </div>

        <nav class="nav-list" aria-label="任务视图">
          <button class="nav-item is-active" data-view="all" type="button">
            <span>◎</span>
            全部任务
          </button>
          <button class="nav-item" data-view="today" type="button">
            <span>◐</span>
            今日任务
          </button>
          <button class="nav-item" data-view="upcoming" type="button">
            <span>◇</span>
            即将到期
          </button>
          <button class="nav-item" data-view="completed" type="button">
            <span>✓</span>
            已完成
          </button>
        </nav>

        <section class="side-section">
          <div class="section-title">标签</div>
          <div id="tagList" class="tag-list"></div>
        </section>

      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Today, keep it moving</p>
            <h1>任务控制台</h1>
          </div>
          <div class="topbar-actions">
            <label class="search-box">
              <span>⌕</span>
              <input id="searchInput" type="search" placeholder="搜索任务、描述或标签" />
            </label>
            <button id="themeToggle" class="icon-button" type="button" aria-label="切换主题">◑</button>
            <button id="openTaskModal" class="primary-button" type="button">＋ 新建任务</button>
          </div>
        </header>

        <section class="stats-grid" aria-label="任务统计">
          <article class="stat-card coral">
            <span>今日待办</span>
            <strong id="todayCount">0</strong>
            <small id="todayHint">保持节奏</small>
          </article>
          <article class="stat-card ink">
            <span>高优先级</span>
            <strong id="highCount">0</strong>
            <small>需要优先处理</small>
          </article>
          <article class="stat-card mint">
            <span>完成率</span>
            <strong id="completionRate">0%</strong>
            <small id="completedCount">0 个已完成</small>
          </article>
          <article class="stat-card paper">
            <span>逾期任务</span>
            <strong id="overdueCount">0</strong>
            <small>尽快重新安排</small>
          </article>
        </section>

        <section class="controls-panel">
          <div class="segmented" role="tablist" aria-label="状态筛选">
            <button class="segment is-active" data-status="all" type="button">全部</button>
            <button class="segment" data-status="todo" type="button">未开始</button>
            <button class="segment" data-status="doing" type="button">进行中</button>
            <button class="segment" data-status="done" type="button">已完成</button>
          </div>
          <div class="filter-row">
            <select id="priorityFilter" aria-label="优先级筛选">
              <option value="all">全部优先级</option>
              <option value="high">高优先级</option>
              <option value="medium">中优先级</option>
              <option value="low">低优先级</option>
            </select>
            <select id="sortSelect" aria-label="排序方式">
              <option value="smart">智能排序</option>
              <option value="priority">按优先级</option>
              <option value="due">按截止时间</option>
              <option value="created">按创建时间</option>
              <option value="manual">手动排序</option>
            </select>
          </div>
        </section>

        <section class="main-grid">
          <section class="task-column">
            <div class="column-head">
              <div>
                <h2 id="viewTitle">全部任务</h2>
                <p id="viewSubtitle">拖动任务卡片可以调整手动顺序。</p>
              </div>
              <button id="clearCompleted" class="ghost-button" type="button">清理已完成</button>
            </div>
            <div id="taskList" class="task-list" aria-live="polite"></div>
          </section>

          <aside class="detail-column">
            <section class="calendar-card">
              <div class="calendar-head apple-calendar-head">
                <div>
                  <span class="section-title">日历</span>
                  <strong id="monthLabel">本月</strong>
                </div>
                <div class="calendar-controls" aria-label="日历切换">
                  <button id="prevMonth" class="calendar-nav" type="button" aria-label="上个月">‹</button>
                  <button id="todayButton" class="calendar-today" type="button">今天</button>
                  <button id="nextMonth" class="calendar-nav" type="button" aria-label="下个月">›</button>
                </div>
              </div>
              <div class="calendar-weekdays" aria-hidden="true">
                <span>一</span>
                <span>二</span>
                <span>三</span>
                <span>四</span>
                <span>五</span>
                <span>六</span>
                <span>日</span>
              </div>
              <div class="calendar-legend" aria-label="日历标识说明">
                <span><i class="legend-rest"></i>休息日</span>
                <span><i class="legend-work"></i>调休上班</span>
                <span><i class="legend-task"></i>有任务</span>
              </div>
              <div id="calendarGrid" class="calendar-grid"></div>
              <div id="selectedDatePanel" class="selected-date-panel"></div>
            </section>

            <section class="mini-board">
              <div class="section-title">状态看板</div>
              <div class="board-lanes">
                <div>
                  <span>未开始</span>
                  <strong id="todoLane">0</strong>
                </div>
                <div>
                  <span>进行中</span>
                  <strong id="doingLane">0</strong>
                </div>
                <div>
                  <span>已完成</span>
                  <strong id="doneLane">0</strong>
                </div>
              </div>
            </section>
          </aside>
        </section>
      </section>
    </main>

    <div id="taskModal" class="modal-backdrop" aria-hidden="true">
      <form id="taskForm" class="task-modal" aria-labelledby="modalTitle">
        <div class="modal-head">
          <div>
            <span class="eyebrow">Task details</span>
            <h2 id="modalTitle">新建任务</h2>
          </div>
          <button id="closeTaskModal" class="icon-button" type="button" aria-label="关闭">×</button>
        </div>

        <input id="taskId" type="hidden" />
        <label>
          任务标题
          <input id="taskTitle" required maxlength="60" placeholder="例如：完成产品原型" />
        </label>
        <label>
          任务描述
          <textarea id="taskDescription" rows="3" placeholder="补充背景、交付物或注意事项"></textarea>
        </label>
        <div class="form-grid">
          <label>
            优先级
            <select id="taskPriority">
              <option value="high">高</option>
              <option value="medium" selected>中</option>
              <option value="low">低</option>
            </select>
          </label>
          <label>
            状态
            <select id="taskStatus">
              <option value="todo">未开始</option>
              <option value="doing">进行中</option>
              <option value="done">已完成</option>
            </select>
          </label>
        </div>
        <div class="form-grid">
          <label>
            截止日期
            <input id="taskDueDate" type="date" required />
          </label>
          <label>
            标签
            <input id="taskTags" placeholder="工作, 学习" />
          </label>
        </div>
        <label class="check-row">
          <input id="taskPinned" type="checkbox" />
          <span>置顶重要任务</span>
        </label>

        <div class="subtask-editor">
          <div class="subtask-top">
            <span>子任务</span>
            <button id="addSubtask" class="ghost-button" type="button">＋ 添加</button>
          </div>
          <div id="subtaskFields" class="subtask-fields"></div>
        </div>

        <div class="modal-actions">
          <button id="deleteTask" class="danger-button" type="button">删除</button>
          <button class="primary-button" type="submit">保存任务</button>
        </div>
      </form>
    </div>

    <div id="toast" class="toast"></div>
    <script src="./app.js"></script>
  </body>
</html>
